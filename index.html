<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Dashboard</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6fb;
        color: #1a1a1a;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 20px;
        color: #4a4a4a;
      }

      .dashboard-frame {
        width: 100%;
        height: 85vh;
        min-height: 700px;
        border: 0;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>My Public Dashboard</h1>
      <p>Built with GitHub Pages + Looker Studio embed.</p>

      <iframe
        class="dashboard-frame"
        src="https://lookerstudio.google.com/embed/reporting/3643ab2d-aac7-4d9e-ac34-24373b463e82/page/klLsF"
        allowfullscreen
      ></iframe>
    </main>
  </body>
</html>
