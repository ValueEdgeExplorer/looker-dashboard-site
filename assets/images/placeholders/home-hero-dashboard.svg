<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Hero Dashboard Placeholder</title>
  <desc id="desc">Placeholder area for hero dashboard screenshot</desc>
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe" />
      <stop offset="100%" stop-color="#d1fae5" />
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#g1)" />
  <rect x="80" y="80" width="1040" height="540" rx="24" fill="#ffffff" stroke="#94a3b8" stroke-dasharray="8 8" />
  <text x="600" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#0f172a">Dashboard Preview Placeholder</text>
  <text x="600" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#334155">Replace with your featured screenshot</text>
